body:
  text: 劉昺燉煌實録晉安帝隆安元年涼州牧李皓微服出城逢虎道邊虎化為人遙呼皓為西涼君皓因彎弧待之又遙呼皓曰有事告汝無疑也皓知其異投弓於地人乃前曰燉煌空虛不是福地君之子孫王於西涼不如從酒泉言訖乃失皓乃移都酒泉御覽百六十五宋質直破虜有威名兒啼恐之即止虜相恚曰使汝行逢宋都督同上二百七十九王棽卒有盜開棽冢者見棽與人樗蒲以杯酒賜盜盜者惶怖既飲之見有人牽銅馬出冢者其夜有神至城門自言我是王孟曾使也今有人發孟曾冢以酒黑其脣明日入城有黑脣者是也但至可以驗而擒之須臾馬還流汗盜明詣城門不覺脣黑城門乃縛詰之如神言孟曾棽之字御覽三百六十八獨異志上白帖童巽字子舉有才學太守京兆諒舉巽上掾歷主簿功曹諒卒官巽衰絰送喪道遇寇虜衆皆散走巽身蔽柩哭嘔血賊欲破棺巽叩頭救請頭破流血賊義而釋之由是顯名御覽四百二十一索苞有文武材舉孝廉除郎中每征伐剋敵勇冠三軍時人比之關羽宋澄於金城為步羌三千人所圍窮守孤塠垂當破沒苞以完騎五千奮劍突陳徑入與澄對坐塠頭拊掌大笑羌皆佩楯擢刀四面直前苞謂澄曰君但安心觀我擊之乃除彄弓按矢繞塠射之莫不應弦而倒皆陷楯通中立殺三十餘人創夷者百計羌即散走稱神同上四百三十七泛固字孔完大將軍掾純之孫也推家財百萬與寡弟婦二百萬與孤兄子於是三府競辟皆不就御覽五百十二索成宗伯夷成善鼓箏者悲歌能使喜者墮淚改調易謳能使戚者起舞時人號曰雍門周同上五百七十六書鈔百一十張存善針存有奴好逃亡存宿行針縮奴腳欲使則針解之同上八百三十侯瑾字子瑜解鳥語常出門見白雀與睪雀同行慨然歎曰今天下大亂君子小人相與雜同上九百二十二索充夢一虜脫上衣來詣充索紞占曰虜去上半下男字也夷虜陰類君妻當生男也已後果驗廣記二百七十六宋桶夢內中有一人著赤衣桶一手把兩杖極打之索紞占曰內中有人是肉字也兩杖箸之象極打肉食也過三日過三家皆得肉食矣同上涼文王張駿夢一人鬢眉皓白自稱子瑜曰地上之事付汝地下之事付我王寤問之有侯子瑜先死得其曾孫亮為祁連令矣同上漢靈帝熹平元年四月甲午蛇長六尺夜於御前當軒而見續漢志注十七
